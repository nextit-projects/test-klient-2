<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>test-klient-2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050508;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      text-align: center;
      padding: 40px 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      border: .5px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,.5);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(74,222,128,.9);
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: 1.05;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255,255,255,.35);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 12px;
      background: #fff;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      font-family: inherit;
      transition: opacity .15s;
    }

    .btn:hover { opacity: .85; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">live · NEXTIT Studio</div>
    <h1>Vítej na<br>tvém webu</h1>
    <p>Tento web byl vytvořen a nasazen přes NEXTIT Studio. Uprav ho v IDE a deploy jedním klikem.</p>
    <a href="#" class="btn">Začít editovat →</a>
  </div>
</body>
</html>
